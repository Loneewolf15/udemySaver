<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <title>Udemy Saver</title>
</head>
<body>
  <div class="glass-panel">
    <div class="logo-area">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8a2be2" />
            <stop offset="100%" stop-color="#4a00e0" />
          </linearGradient>
        </defs>
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <h2>Udemy Saver</h2>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="state-view active">
      <div class="spinner"></div>
      <p>Checking token...</p>
    </div>

    <!-- Missing Token State -->
    <div id="missing-state" class="state-view hidden">
      <p class="subtitle">Access Token not found.</p>
      <p class="description">Please log in to your Udemy account in this browser to continue.</p>
      <button id="login-udemy-btn" class="primary-btn">
        Login to Udemy
      </button>
    </div>

    <!-- Found Token State -->
    <div id="found-state" class="state-view hidden">
      <div class="success-icon">✓</div>
      <p class="subtitle highlight">Access Token Found!</p>
      <p class="description">You are ready to connect to Udemy Saver.</p>
      <button id="connect-btn" class="primary-btn">
        Launch & Connect
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
